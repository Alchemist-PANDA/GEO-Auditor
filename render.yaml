services:
  - type: web
    name: geo-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: geo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: geo-redis
          property: connectionString
      - key: SUPABASE_JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000

  - type: worker
    name: geo-worker
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && arq workers.run_worker.WorkerSettings
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: geo-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: geo-redis
          property: connectionString
      - key: SUPABASE_JWT_SECRET
        fromService:
          type: web
          name: geo-api
          property: envVar:SUPABASE_JWT_SECRET

databases:
  - name: geo-postgres
    databaseName: geo_db
    user: postgres

redis:
  - name: geo-redis
    ipAllowList: []
