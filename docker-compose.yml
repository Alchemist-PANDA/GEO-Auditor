services:
  db:
    image: postgres:15-alpine
    container_name: geo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: geo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geo-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/geo_db
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_JWT_SECRET=securesecret_123_not_a_fake_secret
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geo-worker
    command: ["arq", "workers.run_worker.WorkerSettings"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/geo_db
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_JWT_SECRET=securesecret_123_not_a_fake_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        # Guarantee migration has run via api container startup
        condition: service_started

volumes:
  postgres_data:
